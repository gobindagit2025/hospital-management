{% extends "base.html" %}

{% block title %}Edit Patient – MediCore{% endblock %}
{% block page_title %}Edit Patient{% endblock %}

{% block content %}
<div class="form-card">
    <div class="form-card-header">
        <h2>Update Patient Record</h2>
        <p class="subtitle">Editing: <strong>{{ patient.patient_name }}</strong> (ID #{{ patient.id }})</p>
    </div>

    <form method="POST" action="{{ url_for('edit_patient_route', patient_id=patient.id) }}"
          id="patientForm" novalidate>

        <div class="form-grid">

            <div class="form-group">
                <label class="form-label">Patient Name <span class="required">*</span></label>
                <input type="text" name="patient_name" class="form-input"
                       value="{{ patient.patient_name }}" required />
            </div>

            <div class="form-group">
                <label class="form-label">Age <span class="required">*</span></label>
                <input type="number" name="age" class="form-input"
                       value="{{ patient.age }}" min="0" max="150" required />
            </div>

            <div class="form-group">
                <label class="form-label">Gender <span class="required">*</span></label>
                <select name="gender" class="form-input" required>
                    {% for g in ['Male', 'Female', 'Other'] %}
                    <option value="{{ g }}" {% if patient.gender == g %}selected{% endif %}>{{ g }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Blood Group <span class="required">*</span></label>
                <select name="blood_group" class="form-input" required>
                    {% for bg in ['A+', 'A-', 'B+', 'B-', 'AB+', 'AB-', 'O+', 'O-'] %}
                    <option value="{{ bg }}" {% if patient.blood_group == bg %}selected{% endif %}>{{ bg }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Doctor Name <span class="required">*</span></label>
                <input type="text" name="doctor_name" class="form-input"
                       value="{{ patient.doctor_name }}" required />
            </div>

            <div class="form-group">
                <label class="form-label">Disease / Condition <span class="required">*</span></label>
                <input type="text" name="disease" class="form-input"
                       value="{{ patient.disease }}" required />
            </div>

            <div class="form-group">
                <label class="form-label">Admission Date <span class="required">*</span></label>
                <input type="date" name="admission_date" class="form-input"
                       value="{{ patient.admission_date.strftime('%Y-%m-%d') if patient.admission_date else '' }}"
                       required />
            </div>

            <div class="form-group">
                <label class="form-label">Next Checkup Date</label>
                <input type="date" name="checkup_date" class="form-input"
                       value="{{ patient.checkup_date.strftime('%Y-%m-%d') if patient.checkup_date else '' }}" />
            </div>

            <div class="form-group">
                <label class="form-label">Discharged?</label>
                <select name="discharged" class="form-input" id="dischargedSelect"
                        onchange="toggleDischargeDate()">
                    <option value="No"  {% if patient.discharged == 'No'  %}selected{% endif %}>No – Still Admitted</option>
                    <option value="Yes" {% if patient.discharged == 'Yes' %}selected{% endif %}>Yes – Discharged</option>
                </select>
            </div>

            <div class="form-group" id="dischargeDateGroup"
                 style="{{ 'display:block' if patient.discharged == 'Yes' else 'display:none' }}">
                <label class="form-label">Discharge Date</label>
                <input type="date" name="discharge_date" class="form-input"
                       value="{{ patient.discharge_date.strftime('%Y-%m-%d') if patient.discharge_date else '' }}" />
            </div>

        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
            <a href="{{ url_for('patients') }}" class="btn btn-outline btn-lg">Cancel</a>
        </div>

    </form>
</div>
{% endblock %}
